name: Lint & Syntax Check

on:
  push:
    branches: [main]
    paths: ['rudy/**', 'scripts/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linting tools
        run: pip install ruff

      - name: Ruff check (lint)
        run: ruff check rudy/ --select E,F,W --ignore E501,E402,F401 --output-format github
        continue-on-error: false

      - name: Syntax check all modules
        run: |
          echo "Checking syntax of all Python files in rudy/..."
          find rudy/ -name "*.py" -exec python -m py_compile {} \;
          echo "All modules pass syntax check."

      - name: Syntax check scripts
        run: |
          echo "Checking syntax of script files..."
          find scripts/ -name "*.py" -exec python -m py_compile {} \;
          echo "All scripts pass syntax check."
