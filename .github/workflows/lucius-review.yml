name: Lucius PR Review

on:
  pull_request:
    branches: [main]

jobs:
  # ── Security scanning via bandit (replaces custom regex patterns) ───
  bandit:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install bandit
        run: pip install bandit

      - name: Get changed Python files
        id: changed
        run: |
          # Only scan files changed in this PR (not pre-existing findings)
          git diff --name-only --diff-filter=ACMR origin/main...HEAD -- '*.py' > changed_files.txt
          cat changed_files.txt
          if [ ! -s changed_files.txt ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run bandit on changed files
        if: steps.changed.outputs.skip != 'true'
        run: |
          bandit $(cat changed_files.txt | tr '\n' ' ') \
            -f json \
            -o bandit-results.json \
            --skip B101 \
            --severity-level medium \
            || true

      - name: Report bandit results
        if: steps.changed.outputs.skip != 'true'
        run: |
          python3 -c "
          import json, sys
          try:
              data = json.load(open('bandit-results.json'))
          except (FileNotFoundError, json.JSONDecodeError):
              print('No bandit results — pass.')
              sys.exit(0)
          results = data.get('results', [])
          high = [r for r in results
                  if r.get('issue_severity') == 'HIGH'
                  and r.get('issue_confidence') in ('HIGH', 'MEDIUM')]
          print(f'Bandit: {len(results)} findings ({len(high)} high-severity)')
          for r in results:
              sev = r.get('issue_severity', 'LOW')
              fname = r.get('filename', '')
              line = r.get('line_number', 0)
              text = r.get('issue_text', '')
              test_id = r.get('test_id', '')
              # Use GitHub Actions annotation format for inline comments
              level = 'error' if sev == 'HIGH' else 'warning'
              print(f'::{level} file={fname},line={line}::{test_id}: {text}')
          if high:
              print(f'BLOCKED: {len(high)} high-severity finding(s) in changed files.')
              sys.exit(1)
          print('PASS: No high-severity bandit findings in changed files.')
          "

  # ── Dependency audit via pip-audit ─────────────────────────────────
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --desc --output pip-audit-results.txt || true
            cat pip-audit-results.txt
          else
            echo "No requirements.txt — skipping dependency audit."
          fi
        continue-on-error: true  # Advisory only — don't block PRs on upstream CVEs

  # ── Batcave-specific checks (justified custom — no standard equivalent) ─
  batcave-paths:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for hardcoded Batcave paths in diff
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/ci/lucius_pr_review.py --base main
