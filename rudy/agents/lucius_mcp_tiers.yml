# Lucius MCP Criticality Tiers — ADR-004 v2.1 Section 2.3
#
# Three tiers control session behavior when an MCP is unavailable:
#   CRITICAL  — Session blocked. Cannot proceed.
#   IMPORTANT — Session starts in degraded mode. Warning logged.
#               Skills requiring these MCPs excluded from recommendations.
#   OPTIONAL  — Logged only. No session impact.
#
# Tier assignments are configurable here. Batman can promote or demote
# MCPs without a code change.
#
# Phase 1C timeout values derived from Oracle baselines (2026-03-30):
#   Process checks (CIM cmdline query): ~900ms typical, 1700ms worst case
#   HTTP checks (GitHub API, SMTP): ~100-950ms typical
#   Config checks (.claude.json read): <10ms
#   Default: 30s (unchanged for safety margin)

mcps:
  # CRITICAL — session cannot proceed without these
  github: CRITICAL
  desktop-commander: CRITICAL

  # IMPORTANT — session starts degraded, relevant skills excluded
  gmail: IMPORTANT
  google-calendar: IMPORTANT
  notion: IMPORTANT
  windows-mcp: IMPORTANT

  # OPTIONAL — logged only, no session impact
  brave-search: OPTIONAL
  huggingface: OPTIONAL
  context7: OPTIONAL
  chrome: OPTIONAL

# Per-check timeout overrides (seconds).
# Phase 1C: Set from Oracle smoke test baselines (2026-03-30).
# Process checks (CIM query) are the slowest at ~900ms typical.
# 3x headroom over observed worst case for each check type.
timeouts:
  desktop-commander: 5    # process check via CIM (~900ms typical, 1700ms worst)
  windows-mcp: 3          # process check via tasklist (~400ms typical)
  github: 5               # process check + optional HTTP (~950ms typical)
  gmail: 3                # TCP socket to smtp.zoho.com (~100ms typical)
  google-calendar: 2      # .claude.json read (<10ms typical)
  notion: 2               # .claude.json read (<10ms typical)
  chrome: 2               # .claude.json read (<10ms typical)
  brave-search: 2         # .claude.json read (<10ms typical)
  huggingface: 2          # .claude.json read (<10ms typical)
  context7: 5             # process check via CIM (~900ms typical)
